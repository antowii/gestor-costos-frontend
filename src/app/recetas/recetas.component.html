<div class="section" id="recetas">
                <div class="content-header">
                    <h1>Calculadora de Recetas</h1>
                    <p>Calcula el costo exacto de tus productos</p>
                </div>
                <div class="content-body">
                    <div style="background: #f9f9f9; padding: 1.5rem; border-radius: 8px; border: 1px solid #e0e0e0; margin-bottom: 1.5rem;">
                        <label style="display: block; font-size: 12px; color: #999999; font-weight: 500; margin-bottom: 8px;">Selecciona o crea una receta</label>
                        <select style="width: 100%; padding: 8px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 13px; background: #ffffff;">
                            <option>— Nueva receta —</option>
                            <option>🎂 Torta de chocolate</option>
                            <option>🧁 Cupcakes de vainilla</option>
                            <option>🥐 Medialunas</option>
                        </select>
                    </div>
 
                    <h2 class="section-title">Ingredientes agregados</h2>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem;">
                        <div style="padding: 0.75rem; background: #f9f9f9; border-radius: 8px; display: grid; grid-template-columns: 2fr 80px 80px 80px auto; gap: 8px; align-items: end; font-size: 12px; border: 1px solid #e0e0e0;">
                            <div><strong>🧈 Mantequilla</strong></div>
                            <div>200 g</div>
                            <div style="color: #999999;">$20.80</div>
                        </div>
                        <div style="padding: 0.75rem; background: #f9f9f9; border-radius: 8px; display: grid; grid-template-columns: 2fr 80px 80px 80px auto; gap: 8px; align-items: end; font-size: 12px; border: 1px solid #e0e0e0;">
                            <div><strong>🥚 Huevos</strong></div>
                            <div>3 unid</div>
                            <div style="color: #999999;">$2.55</div>
                        </div>
                    </div>
 
                    <div style="background: #f9f9f9; padding: 1.5rem; border-radius: 8px; border: 1px solid #e0e0e0;">
                        <div class="grid-2">
                            <div>
                                <p class="metric-label">Costo total</p>
                                <p class="metric-value" style="font-size: 20px;">$23.35</p>
                            </div>
                            <div>
                                <label style="display: block; font-size: 11px; color: #999999; font-weight: 500; margin-bottom: 6px;">Porciones</label>
                                <input type="number" value="12" />
                            </div>
                        </div>
                        <div style="padding-top: 1rem; border-top: 1px solid #e0e0e0; margin-top: 1rem;">
                            <p class="metric-label">Costo por porción</p>
                            <p class="metric-value" style="font-size: 20px; color: #0d8f5e;">$1.95</p>
                            <p style="font-size: 11px; color: #999999; margin: 6px 0 0 0;">Si vendes a $5.90 → Ganancia: $3.95/unidad (203%)</p>
                        </div>
                    </div>
 
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 1.5rem;">
                        <button class="btn-primary">💾 Guardar receta</button>
                        <button class="btn-primary">+ Agregar ingrediente</button>
                    </div>
                </div>
            </div>
