<div class="dashboard-container">
  <header class="header">
    <h1>🍪 Gestor de Costos QA</h1>
    <p>Entorno de Pruebas y Automatización</p>
  </header>

  <div class="summary-cards">
    <div class="card total">
      <h3>Total Invertido</h3>
      <p class="number">${{ totalGastado }}</p>
    </div>
    <div class="card count">
      <h3>Productos</h3>
      <p class="number">{{ cantidadProductos }}</p>
    </div>
  </div>

  <div class="main-content">
    <section class="form-section card">
      <h2>Agregar Ingrediente</h2>
      <form (ngSubmit)="guardarCompra()" #compraForm="ngForm">
        <div class="form-group">
          <label for="nombre">Nombre del Producto *</label>
          <input type="text" id="nombre" name="nombre" [(ngModel)]="nuevoIngrediente.nombre" required placeholder="Ej. Cajas de empaque">
        </div>
        
        <div class="form-group">
          <label for="precio">Precio Total ($) *</label>
          <input type="number" id="precio" name="precioTotal" [(ngModel)]="nuevoIngrediente.precioTotal" required min="1">
        </div>

        <button type="submit" class="btn-primary" [disabled]="!compraForm.form.valid">💾 Guardar en Inventario</button>
      </form>
    </section>

    <section class="table-section card">
      <h2>Inventario Actual</h2>
      <table class="modern-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Ingrediente</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of misCompras">
            <td>#{{ item.id }}</td>
            <td class="font-bold">{{ item.nombre }}</td>
            <td>${{ item.precioTotal }}</td>
            <td>
              <button class="btn-danger" (click)="eliminarCompra(item.id)">🗑️ Borrar</button>
            </td>
          </tr>
          <tr *ngIf="misCompras.length === 0">
            <td colspan="4" class="empty-state">No hay ingredientes registrados.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
</div>
